// ── Proxy ─────────────────────────────────────────────────────────────────────
const PROXY_URL = "https://mel-tools-api.burgen-b.workers.dev";
const TOOL_NAME = "analysis-plan-generator";

async function callProxy(body) {
  let res;
  try {
    res = await fetch(PROXY_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ ...body, _tool: TOOL_NAME })
    });
  } catch(e) {
    throw new Error("Could not reach the API. Check your internet connection and try again. (Network error: " + e.message + ")");
  }
  if (res.status === 429) {
    const j = await res.json();
    throw new RateLimitError(j.message || "Daily limit reached. Try again in 24 hours, or download the code from GitHub to use your own API key.");
  }
  if (!res.ok) {
    const j = await res.json().catch(()=>({}));
    throw new Error(j.error || `API error ${res.status}`);
  }
  return res.json();
}
class RateLimitError extends Error {
  constructor(msg) { super(msg); this.isRateLimit = true; }
}

// ── Prompt builders ───────────────────────────────────────────────────────────
function buildPlanPrompt(xlsform, logframe) {
  return `You are a senior MEL specialist. Generate an analysis plan from the XLSForm and logframe below.

XLSFORM SURVEY SHEET (tab-separated):
${xlsform}

LOGFRAME:
${logframe || "No logframe provided."}

Return a JSON object with ONE key: "plan" — array of analysis rows, one per form section or research topic. Each row:
- section: section code and name (e.g. "S3. Safety")
- research_topic: short label
- relevant_questions: variable name(s) from the form
- research_question: specific analytical question including calculation method for indicator rows (numerator/denominator/threshold)
- indicator_link: "Impact Ind. X: [name] - baseline X%, target Y%" OR "Outcome X.X: [name]" OR "Non-indicator: [purpose]"
- visualization: specific chart type and breakdowns
- disaggregation: explicit disaggregation variables
- use_of_information: who uses this and what decision it informs
- flags: action threshold, analytical note (prefix "Analytical note:"), protection flag (prefix "Protection flag:"), or null
- flag_type: "protection", "action", "note", or null

RULES: Map each logframe indicator to form questions. Indicator rows must include exact calculation method. Protection flags must name a focal point. For FCS note weights and thresholds. For cohesion batteries note normalized-average method. Return ONLY valid JSON. No markdown, no preamble.`;
}

function buildSupportingPrompt(xlsform, logframe, planRows) {
  const vars = [...new Set(planRows.flatMap(r=>{ const q=r.relevant_questions; if(Array.isArray(q)) return q; return (q||"").split(/[,\s]+/).filter(Boolean); }))].join(", ");
  const indicators = planRows.filter(r=>r.indicator_link&&!r.indicator_link.startsWith("Non-indicator")).map(r=>r.indicator_link).join("; ");
  return `You are a senior MEL specialist. Generate three supporting outputs for an analysis plan.

FORM VARIABLES: ${vars}

LOGFRAME: ${logframe||"No logframe provided."}

INDICATOR LINKS: ${indicators}

Return a JSON object with exactly these three keys:

"cleaning": array of 8 data quality check strings, each naming specific variables from the form.

"crosstabs": array of 6 objects, each with "variables" (variable names) and "purpose" (why this cross-tab matters for indicator interpretation).

"gaps": array of coverage gaps, each with "severity" (critical/warning/info), "indicator", "issue" (one line), "detail", and "action".

Return ONLY valid JSON. No markdown, no preamble.`;
}

Review the existing analysis plan rows and regenerate ONLY the rows that should have protection flags. Return JSON: {"plan":[...rows with flag_type \"protection\" only...]}. Each row must have: section, research_topic, relevant_questions, research_question, indicator_link, visualization, disaggregation, use_of_information, flags (must start with \"Protection flag:\"), flag_type: \"protection\". No markdown, no preamble.`;

// ── TSV parser ────────────────────────────────────────────────────────────────
function parseTSV(text) {
  const lines = text.trim().split("\n");
  return lines.map(l => l.split("\t").map(c => c.trim()));
}

function countSurveyRows(text) {
  const rows = parseTSV(text);
  const skip = ["begin_group","end_group","begin_repeat","end_repeat","note","calculate",""];
  return rows.filter((r,i) => i > 0 && r[0] && !skip.some(s => r[0].toLowerCase().startsWith(s))).length;
}

      <div className="no-print" style={{ background:"#FDF5F0", borderBottom:"1px solid #E8C4B4", padding:"8px 24px", fontSize:11, color:"#6B5549" }}>

        <a href="https://github.com/BelltawnB/mel-tools-api" target="_blank" style={{ color:"#C67B5C", fontWeight:500, textDecoration:"underline" }}>Download the code on GitHub</a>{" "}

          </p>

          {/* Step 1 */}
          <div style={{ marginBottom:24 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ width:24, height:24, borderRadius:"50%", background:C.forest, color:"white", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, flexShrink:0 }}>1</span>
                <span style={{ fontWeight:600, fontSize:14 }}>XLSForm survey sheet</span>
                <span style={{ fontFamily:C.mono, fontSize:10, color:C.textMuted, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:4, padding:"1px 8px" }}>required</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                {rowCount > 0 && (
                  <span style={{ fontFamily:C.mono, fontSize:11, color:overLimit?C.rust:C.forest }}>
                    {rowCount} question{rowCount!==1?"s":""} {overLimit?"— over 50 limit":"detected"}
                  </span>
                )}

              </div>
            </div>
            <textarea value={xlsInput} onChange={e=>setXlsInput(e.target.value)}

            <div style={{ marginTop:6, fontSize:11, color:C.textMuted, lineHeight:1.5 }}>
              In Excel: right-click the "survey" sheet tab → Move or Copy → paste into a new sheet, select all (Ctrl+A), copy (Ctrl+C), paste here. The tool uses the <em>type</em>, <em>name</em>, and <em>label::English</em> columns.
            </div>
          </div>

          {/* Step 2 */}
          <div style={{ marginBottom:28 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
              <span style={{ width:24, height:24, borderRadius:"50%", background:xlsInput.trim()?C.forest:C.border, color:"white", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, flexShrink:0, transition:"background 0.2s" }}>2</span>
              <span style={{ fontWeight:600, fontSize:14 }}>Logframe or indicator list</span>
              <span style={{ fontFamily:C.mono, fontSize:10, color:C.textMuted, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:4, padding:"1px 8px" }}>optional — improves output</span>
            </div>
            <textarea value={lfInput} onChange={e=>setLfInput(e.target.value)}
              placeholder={"Paste your logframe, results framework, or indicator list.\n\nTab-separated from Excel or plain text both work. Include: indicator names, definitions, baselines, targets, disaggregations. The more complete, the better the indicator linkages and threshold notes."}
              style={{ ...inputStyle, height:160, fontFamily:C.mono, fontSize:11, lineHeight:1.5 }}
            />
          </div>

          {/* Error */}
          {error && (
            <div style={{ marginBottom:16, padding:12, background:isRateLimit?"#FDF5F0":C.rustPale, border:`1px solid ${isRateLimit?"#E8C4B4":C.rustBorder}`, borderRadius:8, fontSize:12 }}>
              {isRateLimit
                ? <div><div style={{ fontWeight:600, color:"#B56A4A", marginBottom:4 }}>⏱ Daily limit reached</div><div style={{ color:"#6B5549", lineHeight:1.6 }}>{error}</div><a href="https://github.com/BelltawnB/mel-tools-api" target="_blank" style={{ display:"inline-block", marginTop:8, color:"#C67B5C", fontWeight:500, textDecoration:"underline" }}>Download the code on GitHub →</a></div>
                : <span style={{ color:C.rust }}>{error}</span>
              }
            </div>
          )}

          {/* Generate button */}
          <div style={{ display:"flex", alignItems:"center", gap:16 }}>
            <button onClick={generate} disabled={!xlsInput.trim()||overLimit||(!!step&&step!=="done")}
              style={{ ...btnPrimary, opacity:(!xlsInput.trim()||overLimit||!!step)?0.5:1 }}>
              {(step==="generating"||step==="supporting"||step==="repairing") && <span style={{ width:14, height:14, border:"2px solid rgba(255,255,255,0.3)", borderTopColor:"#fff", borderRadius:"50%", animation:"spin 0.8s linear infinite", display:"inline-block" }} />}
              {step==="generating" ? "Generating plan…" : step==="supporting" ? "Generating supporting tabs…" : step==="repairing" ? "Repairing response…" : "Generate Analysis Plan"}
            </button>
            {step && (
              <div style={{ fontSize:12, color:C.textMuted }}>
                {step==="generating" && "Step 1 of 2 — generating analysis plan rows…"}
                {step==="supporting" && "Step 2 of 2 — generating cleaning checks, cross-tabs, and gaps…"}
                {step==="repairing" && "Fixing response format — almost done…"}
              </div>
            )}
          </div>

          {/* Format guide */}
          <div style={{ marginTop:28, padding:16, background:C.surfaceAlt, borderRadius:8, border:`1px solid ${C.border}` }}>
            <div style={{ fontFamily:C.mono, fontSize:10, color:C.textDim, letterSpacing:"0.04em", marginBottom:8 }}>WHAT THIS TOOL GENERATES</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              {[
                ["Analysis Plan","Research questions, indicator linkages, visualization specs, and use-of-information for each form section"],
                ["Data Cleaning","Pre-analysis quality checks specific to your form structure"],
                ["Cross-Tabs","Recommended variable pairs for indicator interpretation and protection monitoring"],
                ["Coverage Gaps","Mismatches between logframe indicators and form question coverage"],
              ].map(([t,d])=>(
                <div key={t} style={{ padding:"10px 12px", background:C.surface, borderRadius:6, border:`1px solid ${C.border}` }}>
                  <div style={{ fontWeight:600, fontSize:12, color:C.forest, marginBottom:3 }}>{t}</div>
                  <div style={{ fontSize:11, color:C.textMuted, lineHeight:1.5 }}>{d}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ═══ PLAN VIEW ═══ */}
      {view === VIEWS.PLAN && planData && (
        <>
          {/* Call 2 error warning */}
          {planData._suppError && (
            <div style={{ background:"#FDF5F0", borderBottom:"1px solid #E8C4B4", padding:"8px 24px", fontSize:11, color:"#8B4513" }}>
              ⚠ Supporting tabs (Data Cleaning, Cross-Tabs, Coverage Gaps) did not load — {planData._suppError} Use the ↺ Re-run button on each tab.
            </div>
          )}

          {/* Summary bar */}
          <div className="no-print" style={{ borderBottom:`1px solid ${C.border}`, padding:"8px 24px", display:"flex", gap:28, background:C.surface, flexWrap:"wrap" }}>
            {[
              ["Analysis items", (planData.plan||[]).length, C.forest],
              ["Sections", Object.keys(grouped).length, C.textMid],
              ["Indicator-linked", (planData.plan||[]).filter(r=>!r.indicator_link?.startsWith("Non-indicator")).length, C.sage],
              ["Non-indicator", (planData.plan||[]).filter(r=>r.indicator_link?.startsWith("Non-indicator")).length, C.textMid],
            ].map(([l,v,col])=>(
              <div key={l} style={{ display:"flex", gap:7, alignItems:"baseline" }}>
                <span style={{ fontSize:18, fontWeight:700, color:col, fontFamily:C.mono }}>{v}</span>
                <span style={{ fontSize:11, color:C.textMuted }}>{l}</span>
              </div>
            ))}
          </div>

          {/* Tabs */}
          <div className="no-print" style={{ borderBottom:`1px solid ${C.border}`, padding:"0 24px", display:"flex", background:C.surface }}>
            {TABS.map(k=>{
              const isAlert = k==="gaps";
              const count = k==="gaps" ? critGaps : k==="cleaning" ? (planData.cleaning||[]).length : k==="crosstabs" ? allCrosstabs.length : null;
              const isOn = activeTab===k;
              return (
                <button key={k} className={`tab-btn ${isOn?"tab-on":"tab-off"} ${isAlert?"tab-alert":""}`} onClick={()=>setActiveTab(k)}>
                  {TAB_LABELS[k]}
                  {count != null && count > 0 && (
                    <span style={{ background:isAlert?(isOn?C.rust:C.rustPale):(isOn?C.forest:C.border), color:isAlert?(isOn?"white":C.rust):(isOn?"white":C.textMuted), borderRadius:10, padding:"1px 6px", fontSize:9, fontFamily:C.mono }}>
                      {count}
                    </span>
                  )}
                </button>
              );
            })}
            {protRows.length > 0 && (
              <button className={`tab-btn ${activeTab==="protection"?"tab-on tab-alert":"tab-off tab-alert"}`} onClick={()=>setActiveTab("protection")}>
                Protection Flags
                <span style={{ background:activeTab==="protection"?C.rust:C.rustPale, color:activeTab==="protection"?"white":C.rust, borderRadius:10, padding:"1px 6px", fontSize:9, fontFamily:C.mono }}>{protRows.length}</span>
              </button>
            )}
          </div>

          <div style={{ padding:"20px 16px", overflowX:"auto", maxWidth:"100vw" }}>

            {/* ANALYSIS PLAN */}
            {activeTab==="plan" && <>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, background:C.surface }}>
                <thead>
                  <tr>{["Research Topic","Q#s","Research Question","Indicator Link","Visualization","Disaggregation","Use of Information","Flags","→ Code"].map(h=>(
                    <th key={h} style={{ padding:"9px 10px", textAlign:"left", fontFamily:C.mono, fontSize:8, letterSpacing:1.5, textTransform:"uppercase", color:"white", background:C.forest, whiteSpace:"nowrap" }}>{h}</th>
                  ))}</tr>
                </thead>
                <tbody>
                  {Object.entries(grouped).map(([section,rows])=>(
                    <React.Fragment key={section}>
                      <tr className="sec-hdr"><td colSpan={9} style={{ padding:"7px 10px" }}><span style={{ fontFamily:C.mono, fontSize:8, letterSpacing:2, textTransform:"uppercase", color:C.forest, fontWeight:600 }}>{section}</span></td></tr>
                      {rows.map((row,ri)=>(
                        <tr key={ri} style={{ borderBottom:`1px solid ${C.border}`, background:ri%2===0?C.surface:C.surfaceAlt }}>
                          <td style={{ padding:"8px 10px", color:C.textMid, maxWidth:110, minWidth:80, verticalAlign:"top", fontWeight:500 }}>{row.research_topic}</td>
                          <td style={{ padding:"8px 10px", color:C.forest, fontFamily:C.mono, fontSize:10, verticalAlign:"top", maxWidth:85, overflowWrap:"break-word", wordBreak:"normal", lineHeight:1.5 }}>{row.relevant_questions}</td>
                          <td style={{ padding:"8px 10px", color:C.text, maxWidth:200, minWidth:160, verticalAlign:"top", lineHeight:1.55, wordBreak:"break-word" }}>{row.research_question}</td>
                          <td style={{ padding:"8px 10px", verticalAlign:"top", maxWidth:120, minWidth:100 }}><IndBadge link={row.indicator_link} /></td>
                          <td style={{ padding:"8px 10px", color:C.textMuted, maxWidth:130, minWidth:100, verticalAlign:"top", fontSize:11, lineHeight:1.5, wordBreak:"break-word" }}>{row.visualization}</td>
                          <td style={{ padding:"8px 10px", color:C.textMuted, maxWidth:110, minWidth:90, verticalAlign:"top", fontSize:11, lineHeight:1.5 }}>{row.disaggregation}</td>
                          <td style={{ padding:"8px 10px", color:C.textMid, maxWidth:160, minWidth:120, verticalAlign:"top", lineHeight:1.5, wordBreak:"break-word" }}>{row.use_of_information}</td>
                          <td style={{ padding:"8px 10px", verticalAlign:"top", maxWidth:140, minWidth:100 }}><FlagBadge text={row.flags} type={row.flag_type} /></td>
                          <td style={{ padding:"8px", borderBottom:`1px solid ${C.borderSubtle}`, whiteSpace:"nowrap", verticalAlign:"top" }}>
                            <button onClick={()=>sendToACG(row,"plan")} style={{ ...btnOutline, fontSize:10, padding:"3px 10px", color:C.forest, borderColor:C.border }} title="Generate analysis + visualization code for this row">→ Code</button>
                          </td>
                        </tr>
                      ))}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
              <div className="no-print" style={{ borderTop:`1px solid ${C.border}`, marginTop:28, paddingTop:14, display:"flex", justifyContent:"flex-end", gap:8 }}>
                <button onClick={downloadExcel} style={{ ...btnPrimary, fontSize:12, background:C.sage }}>⬇ Download Excel Report</button>
                <button onClick={()=>window.print()} style={{ ...btnPrimary, fontSize:12 }}>⎙ Print / Save as PDF</button>
              </div>
            </>}

            {/* DATA CLEANING */}
            {activeTab==="cleaning" && <>
              <div style={{ maxWidth:760 }}>
                <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:8 }}>
                <button className="btn-outline" style={{ fontSize:11, padding:"4px 12px" }} onClick={()=>rerunTab("cleaning")} disabled={!!rerunning}>
                  {rerunning==="cleaning" ? "Regenerating…" : "↺ Re-run"}
                </button>
                {rerunError && rerunning===null && <span style={{ fontSize:11, color:C.rust, marginLeft:8 }}>{rerunError}</span>}
              </div>
              <div style={{ background:C.sagePale, border:`1px solid #B8D090`, borderRadius:6, padding:"10px 14px", marginBottom:16, fontSize:12, color:C.textMid, lineHeight:1.6 }}>
                  Run these checks on the raw data export <strong>before</strong> any indicator calculation. Specific to this form's structure and the quality risks identified from your inputs.
                </div>
                {(planData.cleaning||[]).map((item,i)=>(
                  <div key={i} className="check-row">
                    <div style={{ width:16, height:16, border:`1.5px solid ${C.border}`, borderRadius:3, flexShrink:0, marginTop:3 }} />
                    <span style={{ fontSize:13, color:C.textMid, lineHeight:1.6 }}>{item}</span>
                  </div>
                ))}
              </div>
              <div className="no-print" style={{ borderTop:`1px solid ${C.border}`, marginTop:28, paddingTop:14, display:"flex", justifyContent:"flex-end", gap:8 }}>
                <button onClick={downloadExcel} style={{ ...btnPrimary, fontSize:12, background:C.sage }}>⬇ Download Excel Report</button>
                <button onClick={()=>window.print()} style={{ ...btnPrimary, fontSize:12 }}>⎙ Print / Save as PDF</button>
              </div>
            </>}

            {/* CROSS-TABS */}
            {activeTab==="crosstabs" && <>
              <div style={{ maxWidth:940 }}>
                <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:8 }}>
                  <button className="btn-outline" style={{ fontSize:11, padding:"4px 12px" }} onClick={()=>rerunTab("crosstabs")} disabled={!!rerunning}>
                    {rerunning==="crosstabs" ? "Regenerating…" : "↺ Re-run"}
                  </button>
                </div>
                {/* Builder */}
                <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"14px 18px", marginBottom:20 }}>
                  <div style={{ fontFamily:C.mono, fontSize:9, color:C.forest, letterSpacing:2, textTransform:"uppercase", marginBottom:10 }}>+ Add Cross-Tabulation</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 2fr", gap:10, alignItems:"end" }}>
                    <div>
                      <label style={{ display:"block", fontFamily:C.mono, fontSize:8, color:C.sage, letterSpacing:1.5, textTransform:"uppercase", marginBottom:4 }}>Variable A</label>
                      <input value={varA} onChange={e=>{setVarA(e.target.value);setCtError("");}} placeholder="e.g. S11.4 safety" style={{ ...inputStyle, fontSize:12 }} />
                    </div>
                    <div>
                      <label style={{ display:"block", fontFamily:C.mono, fontSize:8, color:C.sage, letterSpacing:1.5, textTransform:"uppercase", marginBottom:4 }}>Variable B</label>
                      <input value={varB} onChange={e=>{setVarB(e.target.value);setCtError("");}} placeholder="e.g. S5.1 displacement status" style={{ ...inputStyle, fontSize:12 }} />
                    </div>
                    <div>
                      <label style={{ display:"block", fontFamily:C.mono, fontSize:8, color:C.sage, letterSpacing:1.5, textTransform:"uppercase", marginBottom:4 }}>Purpose <span style={{ color:C.textDim }}>(optional)</span></label>
                      <div style={{ display:"flex", gap:8 }}>
                        <input value={ctPurpose} onChange={e=>setCtPurpose(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCustomCT()} placeholder="Why this cross-tab matters" style={{ ...inputStyle, fontSize:12, flex:1 }} />
                        <button onClick={addCustomCT} style={{ ...btnPrimary, padding:"8px 16px", fontSize:12, flexShrink:0 }}>Add</button>
                      </div>
                    </div>
                  </div>
                  {ctError && <div style={{ marginTop:6, fontSize:11, color:C.rust, fontFamily:C.mono }}>{ctError}</div>}
                </div>
                {/* Table */}
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ fontFamily:C.mono, fontSize:10, color:C.textMuted }}>{(planData.crosstabs||[]).length} generated · <span style={{ color:customCrosstabs.length>0?C.forest:C.textDim }}>{customCrosstabs.length} custom</span></span>
                  <button className="btn-outline" style={{ fontSize:11, padding:"4px 10px" }} onClick={()=>{ const h="Variables\tPurpose\tSource"; const r=allCrosstabs.map(c=>`${c.variables}\t${c.purpose}\t${c.custom?"Custom":"Generated"}`); navigator.clipboard.writeText([h,...r].join("\n")); flash("Copied!"); }}>Copy All (TSV)</button>
                </div>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, background:C.surface }}>
                  <thead><tr>
                    {["Variables","Analytical Purpose","Source","→ Code"].map(h=><th key={h} style={{ padding:"9px 12px", textAlign:"left", fontFamily:C.mono, fontSize:8, letterSpacing:1.5, textTransform:"uppercase", color:"white", background:C.forest }}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {allCrosstabs.map((ct,i)=>(
                      <tr key={i} style={{ borderBottom:`1px solid ${C.border}`, background:i%2===0?C.surface:C.surfaceAlt }}>
                        <td style={{ padding:"10px 12px", color:C.forest, fontFamily:C.mono, fontSize:10, verticalAlign:"top", lineHeight:1.6, width:"40%" }}>{ct.variables}</td>
                        <td style={{ padding:"10px 12px", color:C.textMid, verticalAlign:"top", lineHeight:1.5 }}>{ct.purpose}</td>
                        <td style={{ padding:"10px 12px", verticalAlign:"top" }}>
                          {ct.custom
                            ? <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                                <span style={{ background:C.sagePale, border:`1px solid #B8D090`, color:C.forest, borderRadius:3, padding:"1px 7px", fontSize:9, fontFamily:C.mono }}>Custom</span>
                                <button onClick={()=>setCustomCrosstabs(p=>p.filter((_,idx)=>idx!==i-(planData.crosstabs||[]).length))} style={{ background:"none", border:"none", color:C.textDim, cursor:"pointer", fontSize:15 }}>×</button>
                              </div>
                            : <span style={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, color:C.textMuted, borderRadius:3, padding:"1px 7px", fontSize:9, fontFamily:C.mono }}>Generated</span>
                          }
                        </td>
                        <td style={{ padding:"10px 12px", borderBottom:`1px solid ${C.borderSubtle}`, whiteSpace:"nowrap", verticalAlign:"top" }}>
                          <button onClick={()=>sendToACG(ct,"crosstab")} style={{ ...btnOutline, fontSize:10, padding:"3px 10px", color:C.forest, borderColor:C.border }} title="Generate cross-tabulation code and visualization">→ Code</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </>}

            {/* COVERAGE GAPS */}
            {activeTab==="gaps" && (
              <div style={{ maxWidth:840 }}>
                <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:8 }}>
                  <button className="btn-outline" style={{ fontSize:11, padding:"4px 12px" }} onClick={()=>rerunTab("gaps")} disabled={!!rerunning}>
                    {rerunning==="gaps" ? "Regenerating…" : "↺ Re-run"}
                  </button>
                </div>
                <div style={{ background:C.amberPale, border:`1px solid ${C.amberBorder}`, borderRadius:6, padding:"10px 14px", marginBottom:20, fontSize:12, color:C.textMid, lineHeight:1.6 }}>
                  Mismatches between your logframe indicators and this form's question coverage. <strong>Critical</strong> gaps affect indicator reportability. <strong>Warnings</strong> affect completeness.
                </div>
                {(planData.gaps||[]).map((gap,i)=>{
                  const s = {
                    critical:{ border:C.rust, bg:C.rustPale, badge:C.rust, label:"Critical" },
                    warning: { border:C.amber, bg:C.amberPale, badge:C.amber, label:"Warning" },
                    info:    { border:"#4A6A9A", bg:"#EBF2FF", badge:"#4A6A9A", label:"Info" },
                  }[gap.severity]||{ border:C.textDim, bg:C.surfaceAlt, badge:C.textMuted, label:gap.severity };
                  return (
                    <div key={i} style={{ background:"white", border:`1px solid ${C.border}`, borderLeft:`3px solid ${s.border}`, borderRadius:6, padding:"14px 16px", marginBottom:10 }}>
                      <div style={{ display:"flex", alignItems:"flex-start", gap:10, marginBottom:8 }}>
                        <span style={{ background:s.bg, border:`1px solid ${s.border}`, color:s.badge, borderRadius:3, padding:"2px 8px", fontSize:9, fontFamily:C.mono, flexShrink:0 }}>{s.label}</span>
                        <div style={{ fontSize:13, fontWeight:600, color:C.text, lineHeight:1.4 }}>{gap.indicator}</div>
                      </div>
                      <div style={{ fontSize:12, color:s.badge, fontWeight:500, marginBottom:6 }}>{gap.issue}</div>
                      <div style={{ fontSize:12, color:C.textMid, lineHeight:1.6, marginBottom:10 }}>{gap.detail}</div>
                      <div style={{ background:C.sagePale, border:`1px solid #B8D090`, borderRadius:4, padding:"8px 12px", fontSize:11, color:C.textMid }}>
                        <span style={{ fontFamily:C.mono, fontSize:8, color:C.forest, letterSpacing:1, textTransform:"uppercase", marginRight:8 }}>Action</span>{gap.action}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* PROTECTION FLAGS */}
            {activeTab==="protection" && (
              <div style={{ maxWidth:820 }}>
                <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:8 }}>
                  <button className="btn-outline" style={{ fontSize:11, padding:"4px 12px" }} onClick={()=>rerunTab("protection")} disabled={!!rerunning}>
                    {rerunning==="protection" ? "Regenerating…" : "↺ Re-run"}
                  </button>
                </div>
                <div style={{ background:C.rustPale, border:`1px solid ${C.rustBorder}`, borderRadius:6, padding:"10px 14px", marginBottom:20, fontSize:12, color:C.textMid, lineHeight:1.6 }}>
                  <strong style={{ color:C.rust }}>{protRows.length} rows</strong> contain protection flags requiring review by the relevant focal point before the analysis report is finalized.
                </div>
                {protRows.map((row,i)=>(
                  <div key={i} style={{ background:"white", border:`1px solid ${C.rustBorder}`, borderLeft:`3px solid ${C.rust}`, borderRadius:6, padding:"14px 16px", marginBottom:10 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                      <div>
                        <div style={{ fontFamily:C.mono, fontSize:8, color:C.sage, letterSpacing:1.5, textTransform:"uppercase", marginBottom:3 }}>{row.section}</div>
                        <div style={{ fontSize:14, fontWeight:600, color:C.text }}>{row.research_topic}</div>
                      </div>
                      <span style={{ fontFamily:C.mono, fontSize:9, color:C.forest, background:C.sagePale, border:`1px solid #B8D090`, borderRadius:3, padding:"2px 8px", flexShrink:0, marginLeft:12 }}>{row.relevant_questions}</span>
                    </div>
                    <div style={{ fontSize:12, color:C.textMid, marginBottom:10, lineHeight:1.55 }}>{row.research_question}</div>
                    <div style={{ background:C.rustPale, border:`1px solid ${C.rustBorder}`, borderRadius:4, padding:"8px 12px", fontSize:12, color:C.rust, lineHeight:1.6 }}>
                      <span style={{ fontFamily:C.mono, fontSize:8, letterSpacing:1, textTransform:"uppercase", marginRight:8 }}>⚑ Flag</span>{row.flags}
                    </div>
                  </div>
                ))}
              </div>
            )}

          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
</body>
</html>
