// ── Logframe parser ────────────────────────────────────────────────────────────
// Handles real-world logframes pasted from Excel.
//
// Key facts learned from actual program data:
//   - Indicators are in COL B (e.g. "P 1.1 Percentage of...", "OP 1.1.1 Number of...")
//   - Results levels are in COL A (e.g. "Purpose 1: Improved access...")
//   - Multi-line cell content (newlines inside quoted Excel cells) arrives as
//     continuation rows — these have no tabs or have col A AND col B both empty/fragment
//   - Col B on a results row is a header row label (e.g. "Indicator"), not an indicator
//   - Many cols after B (definition, source, MoV, frequency, baseline, target, etc.)
//     appear as subsequent cols on the same row — map them to register fields
//
// Returns { results: [...Tab1 rows], indicators: [...Tab2 rows] }
function parseLogframe(text, existingResults) {
  // Detect quoted multi-line cells: Excel wraps cells with newlines in double-quotes.
  // When pasted, those newlines become literal \n within the row.
  // Strategy: first reassemble quoted cells that span multiple raw lines.
  const lines = reassembleQuotedCells(text);

  // Results-level patterns — match col A
  // Capture group 1 = the numeric part (e.g. "1", "1.1", "2.3") so we can reuse it as the resultId
  const LEVEL_PATTERNS = [
    { re:/^goal\s*([\d.]*)[:\s]/i,          level:'Goal',    prefix:'G' },
    { re:/^impact\s*([\d.]*)[:\s]/i,         level:'Goal',    prefix:'G' },
    { re:/^purpose\s*([\d.]*)[:\s]/i,        level:'Purpose', prefix:'P' },
    { re:/^outcome\s*([\d.]*)[:\s]/i,        level:'Outcome', prefix:'OC' },
    { re:/^output\s*([\d.]+)[:\s]/i,         level:'Output',  prefix:'OP' },
    { re:/^ops?\s*([\d.]+)[:\s]/i,           level:'Output',  prefix:'OP' },  // Op 1.1: / Ops 1.1:
    { re:/^activity\s*([\d.]*)[:\s]/i,       level:'Output',  prefix:'OP' },
    { re:/^intermediate result\s*([\d.]*)[:\s]/i, level:'Outcome', prefix:'OC' },
    { re:/^ir\s*([\d.]+)[:\s]/i,             level:'Outcome', prefix:'OC' },  // IR 1:
  ];

  // Indicator ID patterns — match col B
  // Covers: P 1.1, OP 1.1.1, plain numeric "1.", "1.1", "1.1.1", "Number of...", "% of..."
  const INDICATOR_ID_PATTERNS = [
    /^[A-Z]{1,3}\s*\d+[\.\d]*\s+/i,         // P 1.1 ..., OP 1.2.3 ...
    /^\d+\.\d[\d.]*\s+/,                      // 1.1 Difference..., 1.1.1 # of HH...
    /^\d+\.\s+/,                              // 1. % of beneficiaries...
    /^#\s*of\b/i,
    /^number of\b/i,
    /^percent(age)? of\b/i,
    /^%\s*(of\b|households\b|children\b|beneficiar|local\b|women\b|individ)/i,
    /^proportion of\b/i,
    /^rate of\b/i,
    /^mean\b/i,
    /^score\b/i,
    /^index\b/i,
    /^prevalence\b/i,
    /^difference in\b/i,
    /^reduced\b/i,
  ];

  // Header/skip patterns for col B — these are column headers or non-indicator content
  const COL_B_SKIP = [
    /^indicator\s*(definition|name|$)/i,
    /^null$/i,
    /^source$/i,
    /^means of/i,
    /^monitoring/i,
    /^question source/i,
    /^numerator$/i,
    /^denominator$/i,
    /^reporting freq/i,
    /^baseline/i,
    /^target/i,
    /^unit of dis/i,
    /^analysis$/i,
    /^risks/i,
    /^audience$/i,
    /^comments$/i,
    /^T\d+\./i,                 // T1. Baseline/endline surveys
    /^FFP\b/i,
    /^OFDA\b/i,
    /^Custom$/i,
    /^- /,                      // bullet fragments from multi-line cells
    /^\d+%/,                    // percentage fragments
    /^(twice|once|monthly|quarterly|annually|semi)/i,
    /^(section|baseline:|target:|mean\s*=)/i,
  ];

  // Build counters seeded from existing results so IDs don't collide
  const levelCounters = { G:0, P:0, OC:0, OP:0 };
  (existingResults || []).forEach(r => {
    const prefixMap = { Goal:'G', Purpose:'P', Outcome:'OC', Output:'OP' };
    const prefix = prefixMap[r.level];
    if (prefix) levelCounters[prefix] = Math.max(levelCounters[prefix], parseInt(r.resultId.replace(/\D/g,''))||0);
  });
  const nextId = (prefix) => { levelCounters[prefix] = (levelCounters[prefix]||0) + 1; return prefix + levelCounters[prefix]; };

  // Column index map — built from header row if present, falls back to Yemen defaults
  // Keys are Register field names, values are column indices
  let colMap = {
    definition:2, source:3, meansOfVerification:4, questionSource:6,
    numerator:7, denominator:8, frequency:9, baseline:10, target:12,
    disaggregations:13, analysisMethod:14, audience:17
  };
  let headerDetected = false;

  // Header detection patterns: maps header text → Register field key
  const HEADER_PATTERNS = [
    { re:/^indicator\s*def/i,         key:'definition' },
    { re:/^definition/i,              key:'definition' },
    { re:/^(data\s*)?source/i,        key:'source' },
    { re:/^means of ver/i,            key:'meansOfVerification' },
    { re:/^question\s*source/i,       key:'questionSource' },
    { re:/^numerator/i,               key:'numerator' },
    { re:/^denominator/i,             key:'denominator' },
    { re:/^(reporting\s*)?freq/i,     key:'frequency' },
    { re:/^baseline/i,                key:'baseline' },
    { re:/^target\s*(value)?$/i,      key:'target' },
    { re:/^unit of dis/i,             key:'disaggregations' },
    { re:/^(unit of\s*)?dis.?aggreg/i,key:'disaggregations' },
    { re:/^analysis/i,                key:'analysisMethod' },
    { re:/^(reporting\s*)?audience/i, key:'audience' },
  ];

  const results = [];
  const indicators = [];
  const seen = new Set();
  let lastResultId = '';

  // Helper: extract fields from a row using the current colMap
  const extractFields = (cols) => {
    const g = (key) => clean(cols[colMap[key]] || '');
    return {
      def:      g('definition'),
      source:   mapSource(g('source')),
      mov:      g('meansOfVerification'),
      qSrc:     g('questionSource'),
      num:      g('numerator'),
      den:      g('denominator'),
      freq:     mapFrequency(g('frequency')),
      baseline: g('baseline'),
      target:   extractTarget(g('target')),
      disagg:   g('disaggregations'),
      analysis: g('analysisMethod'),
      audience: mapAudience(g('audience')),
    };
  };

  for (const line of lines) {
    const cols = splitTSV(line);
    const c0 = (cols[0] || '').trim();
    const c1 = (cols[1] || '').trim();

    if (!c0 && !c1) continue;

    // ── Header row detection ───────────────────────────────────────────────────
    // If col B looks like "Indicator" or "Indicator Definition", this is a header row
    // Scan all columns and build colMap from header labels
    if (!headerDetected && /^indicator/i.test(c1) && cols.length > 4) {
      const newMap = {};
      cols.forEach((h, i) => {
        const hTrim = (h||'').trim();
        const match = HEADER_PATTERNS.find(p => p.re.test(hTrim));
        if (match && !(match.key in newMap)) newMap[match.key] = i;
      });
      // Only adopt if we detected at least 3 useful columns
      if (Object.keys(newMap).length >= 3) {
        colMap = { ...colMap, ...newMap };
        headerDetected = true;
      }
      continue; // header row — don't try to parse as data
    }

    // ── Results level row (col A matches) ──────────────────────────────────────
    const levelMatch = LEVEL_PATTERNS.find(lp => lp.re.test(c0));
    if (levelMatch) {
      const m = c0.match(levelMatch.re);
      const numericPart = m && m[1] ? m[1] : null;
      const resultId = numericPart ? (levelMatch.prefix + numericPart) : nextId(levelMatch.prefix);
      const statement = c0.replace(levelMatch.re, '').replace(/^[\s:]+/, '').trim();
      results.push({ _id:'p_'+Date.now()+Math.random(), level:levelMatch.level, resultId, statement, assumptions:'' });
      lastResultId = resultId;
      // ALSO check col B — some formats put the indicator on the same row as the result
      if (c1 && !COL_B_SKIP.some(p => p.test(c1)) && INDICATOR_ID_PATTERNS.some(p => p.test(c1)) && !seen.has(c1)) {
        seen.add(c1);
        const [indicatorId, name] = splitIndicatorId(c1);
        const {def,source,mov,qSrc,num,den,freq,baseline,target,disagg,analysis,audience} = extractFields(cols);
        indicators.push({ ...makeRow(REGISTER_FIELDS), _id:'pi_'+Date.now()+Math.random(), indicatorId, name, definition:def, resultLink:lastResultId, source, meansOfVerification:mov, questionSource:qSrc, numerator:num, denominator:den, frequency:freq, baseline, target, disaggregations:disagg, analysisMethod:analysis, audience });
      }
      continue;
    }

    // ── Indicator row (col B matches an indicator ID pattern) ─────────────────
    if (c1 && !COL_B_SKIP.some(p => p.test(c1)) && INDICATOR_ID_PATTERNS.some(p => p.test(c1))) {
      if (!seen.has(c1)) {
        seen.add(c1);
        const [indicatorId, name] = splitIndicatorId(c1);
        const {def,source,mov,qSrc,num,den,freq,baseline,target,disagg,analysis,audience} = extractFields(cols);

        indicators.push({
          ...makeRow(REGISTER_FIELDS),
          _id: 'pi_'+Date.now()+Math.random(),
          indicatorId, name,
          definition: def,
          resultLink: lastResultId,
          source, meansOfVerification:mov, questionSource:qSrc,
          numerator:num, denominator:den,
          frequency:freq, baseline, target,
          disaggregations:disagg, analysisMethod:analysis, audience,
        });
      }
      continue;
    }

    // ── Fallback: col A has what looks like an indicator (single-column logframes) ──
    if (!c1 && c0 && INDICATOR_ID_PATTERNS.some(p => p.test(c0)) && !LEVEL_PATTERNS.some(lp => lp.re.test(c0))) {
      if (!seen.has(c0)) {
        seen.add(c0);
        const [indicatorId, name] = splitIndicatorId(c0);
        indicators.push({ ...makeRow(REGISTER_FIELDS), _id:'pi_'+Date.now()+Math.random(), indicatorId, name, resultLink:lastResultId });
      }
    }
  }

  return { results, indicators };
}

// Split "P 1.1 Percentage of..." → ["P1.1", "Percentage of..."]
// Also handles plain numeric: "1.1.1 # of HH..." → ["1.1.1", "# of HH..."]
// And "1. % of beneficiaries..." → ["1", "% of beneficiaries..."]
function splitIndicatorId(str) {
  // Letter prefix: P 1.1, OP 1.2.3, OC 1.1
  const letterMatch = str.match(/^([A-Z]{1,3}\s*[\d.]+)\s+(.*)/i);
  if (letterMatch) return [letterMatch[1].replace(/\s+/g,''), letterMatch[2].trim()];
  // Plain numeric with dot: 1.1.1 # of..., 1.2 Reduced...
  const numericMatch = str.match(/^(\d+(?:\.\d+)+)\.?\s+(.*)/);
  if (numericMatch) return [numericMatch[1], numericMatch[2].trim()];
  // Single number with dot: 1. % of...
  const singleMatch = str.match(/^(\d+)\.\s+(.*)/);
  if (singleMatch) return [singleMatch[1], singleMatch[2].trim()];
  return ['', str];
}

// Reassemble rows that were split by newlines inside quoted Excel cells.
// Excel quote-wraps cells containing newlines: "line1\nline2\nline3"
// When pasted, these appear as separate lines. We rejoin them.
function reassembleQuotedCells(text) {
  const raw = text.split('\n');
  const out = [];
  let buf = '';
  let openQuotes = 0;

  for (const line of raw) {
    // Count unescaped quotes to track whether we're inside a quoted cell
    const q = (line.match(/"/g) || []).length;
    openQuotes += q;

    if (buf) {
      buf += ' ' + line.trimEnd();
    } else {
      buf = line.trimEnd();
    }

    // Even number of total quotes seen → all cells are closed
    if (openQuotes % 2 === 0) {
      out.push(buf);
      buf = '';
      openQuotes = 0;
    }
  }
  if (buf) out.push(buf);
  return out;
}

// Split a TSV line respecting quoted fields (which may contain tabs)
function splitTSV(line) {
  const cols = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === '\t' && !inQ) { cols.push(cur); cur = ''; }
    else { cur += ch; }
  }
  cols.push(cur);
  return cols;
}

function clean(v) {
  if (!v) return '';
  const s = v.replace(/^"+|"+$/g, '').replace(/\s+/g,' ').trim();
  return s === 'null' ? '' : s;
}

function extractTarget(v) {
  if (!v) return '';
  // Strip "Target:" prefix common in logframes
  return v.replace(/^target[:\s]*/i, '').trim();
}

function mapSource(v) {
  if (!v) return '';
  const vl = v.toLowerCase();
  if (/baseline|endline|survey/i.test(vl)) return 'Baseline/endline survey';
  if (/post.?distrib|pdm/i.test(vl)) return 'Post-distribution monitoring';
  if (/registr/i.test(vl)) return 'Registration records';
  if (/distribut/i.test(vl)) return 'Distribution records';
  if (/carm/i.test(vl)) return 'CARM records';
  if (/training|attendance/i.test(vl)) return 'Training attendance';
  if (/admin/i.test(vl)) return 'Admin records';
  return v;
}

function mapFrequency(v) {
  if (!v) return '';
  const vl = v.toLowerCase();
  if (/monthly/i.test(vl)) return 'Monthly';
  if (/quarterly/i.test(vl)) return 'Quarterly';
  if (/semi.?annual/i.test(vl)) return 'Semi-annually';
  if (/annual/i.test(vl)) return 'Annually';
  if (/baseline.*endline|endline.*baseline|twice/i.test(vl)) return 'Baseline + endline';
  if (/baseline only/i.test(vl)) return 'Baseline only';
  if (/per distrib/i.test(vl)) return 'Per distribution cycle';
  if (/continu/i.test(vl)) return 'Continuous';
  return v;
}

function mapAudience(v) {
  if (!v) return '';
  const vl = v.toLowerCase();
  if (/donor.*agenc|agenc.*donor/i.test(vl)) return 'Donor + Agencies';
  if (/donor.*program|program.*donor/i.test(vl)) return 'Donor + Program Managers';
  if (/donor/i.test(vl)) return 'Donor';
  if (/program manager/i.test(vl)) return 'Program Managers';
  if (/internal/i.test(vl)) return 'Internal only';
  return v;
}

// ── Auto-ID logic for Results ──────────────────────────────────────────────────
function suggestResultId(level, existingResults) {
  const prefixMap = { Goal:'G', Purpose:'P', Outcome:'OC', Output:'OP' };
  const prefix = prefixMap[level] || level.slice(0,2).toUpperCase();
  const existing = existingResults.filter(r => r.level === level).length;
  return prefix + (existing + 1);
}

// Map Register source/methodology values → Dictionary sourceFramework options
function mapSourceFramework(source, indicatorName) {
  const n = (indicatorName||'').toLowerCase();
  const s = (source||'').toLowerCase();
  if (/fcs|food consumption/i.test(n)) return 'Standard (WFP FCS)';
  if (/muac|gam|acute malnutrition|sam\b|mam\b/i.test(n)) return 'Standard (SMART)';
  if (/hhs|hunger scale/i.test(n)) return 'Standard (HHS)';
  if (/rcsi|coping strateg/i.test(n)) return 'Standard (rCSI)';
  if (/hdds|diet.*divers/i.test(n)) return 'Standard (HDDS)';
  if (/ffp/i.test(s)) return 'FFP Standard';
  if (/usaid/i.test(s)) return 'USAID Standard';
  return 'Custom';
}

// ── SmartSelect ────────────────────────────────────────────────────────────────
function SmartSelect({ value, options, onChange, placeholder }) {
  const isCustom = value && !options.includes(value);
  const [showCustom, setShowCustom] = useState(isCustom);
  const [customVal, setCustomVal] = useState(isCustom ? value : '');
  const inputRef = useRef(null);
  useEffect(() => { if (showCustom && inputRef.current) inputRef.current.focus(); }, [showCustom]);

  if (showCustom) return (
    <div style={{display:'flex',alignItems:'center',padding:'4px 6px',gap:4}}>
      <input ref={inputRef} value={customVal}
        onChange={e => { setCustomVal(e.target.value); onChange(e.target.value); }}
        onBlur={() => { if (!customVal) { setShowCustom(false); onChange(''); } }}
        placeholder="Type value…"
        style={{flex:1,border:'none',outline:'none',background:'transparent',fontFamily:"'DM Sans',sans-serif",fontSize:12,color:C.ink}}
      />
      <button onClick={() => { setShowCustom(false); setCustomVal(''); onChange(''); }}
        style={{background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:13,lineHeight:1,padding:'0 2px'}}>×</button>
    </div>
  );
  return (
    <select value={value || ''} onChange={e => { if (e.target.value === '__other') { setShowCustom(true); setCustomVal(''); } else { onChange(e.target.value); } }}
      style={{width:'100%',border:'none',outline:'none',background:'transparent',fontFamily:"'DM Sans',sans-serif",fontSize:12,color:value?C.ink:C.muted,padding:'6px 8px',cursor:'pointer'}}>
      <option value="">{placeholder || '— select —'}</option>
      {options.map(o => <option key={o} value={o}>{o}</option>)}
      <option value="__other">Other (specify)…</option>
    </select>
  );
}

// ── ResultsSelect: dropdown populated from Tab 1 ───────────────────────────────
function ResultsSelect({ value, results, onChange }) {
  // value = resultId string (e.g. "OP1")
  // Display: "OP1: Improved access to..." (truncated)
  const displayLabel = (resultId) => {
    const r = results.find(r => r.resultId === resultId);
    if (!r) return resultId || '';
    const stmt = r.statement ? r.statement.slice(0, 40) + (r.statement.length > 40 ? '…' : '') : '';
    return `${r.resultId}: ${stmt}`;
  };

  // Orphan detection: value set but not in current results
  const isOrphan = value && !results.find(r => r.resultId === value);

  return (
    <select value={value || ''} onChange={e => onChange(e.target.value)}
      style={{width:'100%',border:'none',outline:'none',background:'transparent',fontFamily:"'DM Sans',sans-serif",fontSize:12,color:isOrphan?C.red:value?C.ink:C.muted,padding:'6px 8px',cursor:'pointer',fontStyle:isOrphan?'italic':'normal'}}>
      <option value="">— link to result —</option>
      {isOrphan && <option value={value} style={{color:C.red}}>⚠ {value} (deleted)</option>}
      {results.map(r => (
        <option key={r._id} value={r.resultId}>{displayLabel(r.resultId)}</option>
      ))}
    </select>
  );
}

// ── RegisterSelect: dropdown populated from Tab 2 ─────────────────────────────
// onSelectRow: optional callback receiving the full register row — used by Dictionary
// to pre-populate governance fields when an indicator is chosen
function RegisterSelect({ value, register, onChange, onSelectRow, dictionaryEntries }) {
  const isOrphan = value && !register.find(r => r.name === value);
  // Indicators that already have a dictionary entry
  const entered = new Set((dictionaryEntries||[]).map(d => d.indicator).filter(Boolean));
  return (
    <select value={value || ''} onChange={e => {
      const v = e.target.value;
      onChange(v);
      if (onSelectRow && v) {
        const row = register.find(r => r.name === v);
        if (row) onSelectRow(row);
      }
    }}
      style={{width:'100%',border:'none',outline:'none',background:'transparent',fontFamily:"'DM Sans',sans-serif",fontSize:12,color:isOrphan?C.red:value?C.ink:C.muted,padding:'6px 8px',cursor:'pointer',fontStyle:isOrphan?'italic':'normal'}}>
      <option value="">— select indicator —</option>
      {isOrphan && <option value={value} style={{color:C.red}}>⚠ {value} (deleted)</option>}
      {register.map(r => (
        <option key={r._id} value={r.name}>
          {entered.has(r.name) && !isOrphan ? '✓ ' : ''}{r.name}
        </option>
      ))}
    </select>
  );
}

// ── Tag ────────────────────────────────────────────────────────────────────────
function Tag({ value, map }) {
  const s = map[value] || { bg:'#F3F4F6', color:C.muted };
  return <span style={{background:s.bg,color:s.color,border:`1px solid ${s.color}33`,borderRadius:3,padding:'2px 7px',fontSize:10,fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,letterSpacing:'0.04em'}}>{value || '—'}</span>;
}
const COMP_MAP = { 'None':{bg:'#E8F5E9',color:'#2E7D32'}, 'Partial':{bg:'#FFF8E1',color:'#8B6914'}, 'Full break':{bg:'#FFF0F0',color:'#C62828'} };
const PIRS_MAP = { 'Approved':{bg:'#E8F5E9',color:'#2E7D32'}, 'Reviewed':{bg:'#FFF8E1',color:'#8B6914'}, 'Drafted':{bg:'#F3F4F6',color:'#6B7280'} };
const STATUS_MAP = { 'Finalized':{bg:'#E8F5E9',color:'#2E7D32'}, 'In progress':{bg:'#FFF8E1',color:'#8B6914'}, 'Not started':{bg:'#F3F4F6',color:'#6B7280'}, 'Finalized — under review':{bg:'#FFF3E0',color:'#E65100'} };

// ── EditableCell ───────────────────────────────────────────────────────────────
function EditableCell({ value, field, onChange, results, register, onSelectRow, dictionaryEntries }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  const ref = useRef(null);
  useEffect(() => setVal(value), [value]);
  useEffect(() => { if (editing && ref.current) ref.current.focus(); }, [editing]);
  const commit = () => { setEditing(false); if (val !== value) onChange(val); };

  if (field.type === 'bool') return (
    <div onClick={() => onChange(!value)} style={{padding:'7px 8px',cursor:'pointer',display:'flex',alignItems:'center',gap:6,userSelect:'none'}}>
      <div style={{width:15,height:15,borderRadius:3,border:`2px solid ${value?C.ochre:C.border}`,background:value?C.ochre:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
        {value && <span style={{color:'#fff',fontSize:10,fontWeight:700,lineHeight:1}}>✓</span>}
      </div>
      <span style={{fontSize:11,color:value?C.ochre:C.muted}}>{value ? 'Yes' : 'No'}</span>
    </div>
  );

  if (field.type === 'date') return (
    <input type="date" value={val || ''} onChange={e => { setVal(e.target.value); onChange(e.target.value); }}
      style={{width:'100%',border:'none',outline:'none',background:'transparent',fontFamily:"'DM Sans',sans-serif",fontSize:12,color:C.ink,padding:'7px 8px',cursor:'pointer'}}
    />
  );

  if (field.type === 'smart') return (
    <SmartSelect value={val || ''} options={field.options} onChange={v => { setVal(v); onChange(v); }} placeholder={field.hint || '— select —'} />
  );

  if (field.type === 'resultsSelect') return (
    <ResultsSelect value={val || ''} results={results || []} onChange={v => { setVal(v); onChange(v); }} />
  );

  if (field.type === 'registerSelect') return (
    <RegisterSelect value={val || ''} register={register || []} onChange={v => { setVal(v); onChange(v); }} onSelectRow={onSelectRow} dictionaryEntries={dictionaryEntries} />
  );

  // free text
  if (editing) return (
    <textarea ref={ref} value={val || ''} onChange={e => setVal(e.target.value)} onBlur={commit}
      onKeyDown={e => { if (e.key === 'Escape') { setVal(value); setEditing(false); } }}
      style={{width:'100%',minHeight:56,padding:'6px 8px',border:`1.5px solid ${C.ochre}`,borderRadius:4,outline:'none',fontFamily:"'DM Sans',sans-serif",fontSize:12,color:C.ink,resize:'vertical',background:'#FFFDF5'}}
    />
  );
  return (
    <div onClick={() => setEditing(true)} style={{padding:'7px 8px',cursor:'text',minHeight:32,fontSize:12,fontFamily:"'DM Sans',sans-serif",color:C.ink,lineHeight:1.4}} title={field.hint}>
      {val ? <span>{val}</span> : <span style={{color:C.muted,fontStyle:'italic',fontSize:11}}>{field.hint || 'Click to edit'}</span>}
    </div>
  );
}

// ── GroupHeaderRow ─────────────────────────────────────────────────────────────
function GroupHeaderRow({ groups, fields }) {
  const gmap = {};
  groups.forEach(g => g.cols.forEach(c => { gmap[c] = g; }));
  const spans = [];
  let i = 0;
  while (i < fields.length) {
    const g = gmap[fields[i].key];
    let span = 1;
    while (i + span < fields.length && gmap[fields[i + span].key] === g) span++;
    spans.push({ g, span });
    i += span;
  }
  return (
    <tr>
      <th style={{background:'#F0EDE6',border:'1px solid #DDD',width:28,padding:0}}></th>
      {spans.map((s, idx) => (
        <th key={idx} colSpan={s.span} style={{background:s.g?s.g.bg:'#F5F5F5',border:`1px solid ${s.g?s.g.border:'#DDD'}`,padding:'5px 10px',textAlign:'center',fontFamily:"'IBM Plex Mono',monospace",fontSize:9,fontWeight:700,color:'#333',letterSpacing:'0.05em',textTransform:'uppercase'}}>
          {s.g ? s.g.label : ''}
        </th>
      ))}
    </tr>
  );
}

// ── Excel export ───────────────────────────────────────────────────────────────
const FOREST = "2D5016";
const BD = { style:"thin", color:{ rgb:"C0C0C0" } };
const BA = { top:BD, bottom:BD, left:BD, right:BD };
function styleH(ws, n) { for (let c=0; c<n; c++) { const a=XLSX.utils.encode_cell({r:0,c}); if (!ws[a]) continue; ws[a].s={font:{bold:true,color:{rgb:"FFFFFF"},name:"Cambria",sz:10},fill:{fgColor:{rgb:FOREST}},alignment:{wrapText:true,vertical:"center",horizontal:"center"},border:BA}; } }
function styleD(ws, nr, nc) { for (let r=1; r<nr; r++) { const ev=r%2===0; for (let c=0; c<nc; c++) { const a=XLSX.utils.encode_cell({r,c}); if (!ws[a]) ws[a]={t:"s",v:""}; ws[a].s={font:{name:"Calibri",sz:9,color:{rgb:"333333"}},alignment:{wrapText:true,vertical:"top"},border:BA,...(ev?{fill:{fgColor:{rgb:"F7FAF4"}}}:{})}; } } }

function exportAll(results, register, dictionary, tools, ownership, changelog, programInfo) {
  const wb = XLSX.utils.book_new();

  // Results Framework
  const rh = RESULTS_FIELDS.map(f => f.label);
  const rr = results.map(r => RESULTS_FIELDS.map(f => r[f.key] || ''));
  const ws1 = XLSX.utils.aoa_to_sheet([rh, ...rr]);
  styleH(ws1, rh.length); styleD(ws1, rr.length+1, rh.length);
  ws1["!freeze"] = {xSplit:0,ySplit:1}; ws1["!cols"] = RESULTS_FIELDS.map(f => ({wch:Math.round(f.w/7)})); ws1["!rows"] = [{hpt:22},...rr.map(()=>({hpt:55}))];
  XLSX.utils.book_append_sheet(wb, ws1, "Results Framework");

  // Indicator Register
  const ih = REGISTER_FIELDS.map(f => f.label);
  const ir = register.map(r => REGISTER_FIELDS.map(f => r[f.key] || ''));
  const ws2 = XLSX.utils.aoa_to_sheet([ih, ...ir]);
  styleH(ws2, ih.length); styleD(ws2, ir.length+1, ih.length);
  ws2["!freeze"] = {xSplit:2,ySplit:1}; ws2["!cols"] = REGISTER_FIELDS.map(f => ({wch:Math.round(f.w/7)})); ws2["!rows"] = [{hpt:22},...ir.map(()=>({hpt:60}))];

  // Indicator Dictionary
  const dh = DICT_FIELDS.map(f => f.label);

  const wsd = XLSX.utils.aoa_to_sheet([dh, ...dr]);
  styleH(wsd, dh.length); styleD(wsd, dr.length+1, dh.length);
  // PIRS Status conditional formatting (col 11)
  for (let r=1; r<dr.length+1; r++) {
    const a = XLSX.utils.encode_cell({r, c:11}); if (!wsd[a]) continue;
    const v = (wsd[a].v || ''); const ev = r%2===0;
    let fill = ev ? {fgColor:{rgb:"F7FAF4"}} : undefined;
    let font = {name:"Calibri",sz:9,color:{rgb:"333333"}};
    if (v==='Approved') { fill={fgColor:{rgb:"E8F5E9"}}; font={...font,color:{rgb:"2E7D32"}}; }

  }
  wsd["!freeze"] = {xSplit:1,ySplit:1}; wsd["!cols"] = DICT_FIELDS.map(f => ({wch:Math.round(f.w/7)})); wsd["!rows"] = [{hpt:22},...dr.map(()=>({hpt:60}))];
  XLSX.utils.book_append_sheet(wb, wsd, "Indicator Governance");

  // Monitoring Tools
  const th2 = TOOLS_FIELDS.map(f => f.label);
  const tr2 = tools.map(r => TOOLS_FIELDS.map(f => r[f.key] || ''));
  const wst = XLSX.utils.aoa_to_sheet([th2, ...tr2]);
  styleH(wst, th2.length);
  // Status conditional formatting (last col)
  const statusCol = TOOLS_FIELDS.findIndex(f => f.key === 'status');
  for (let r=1; r<tr2.length+1; r++) {
    const a = XLSX.utils.encode_cell({r, c:statusCol}); if (!wst[a]) continue;
    const v = (wst[a].v || ''); const ev = r%2===0;
    let fill = ev ? {fgColor:{rgb:"F7FAF4"}} : undefined;
    let font = {name:"Calibri",sz:9,color:{rgb:"333333"}};
    if (/finalized/i.test(v) && !/review/i.test(v)) { fill={fgColor:{rgb:"E8F5E9"}}; font={...font,color:{rgb:"2E7D32"}}; }
    else if (/progress/i.test(v)) { fill={fgColor:{rgb:"FFF8E1"}}; font={...font,color:{rgb:"8B6914"}}; }
    else if (/not started/i.test(v)) { fill={fgColor:{rgb:"F3F4F6"}}; font={...font,color:{rgb:"6B7280"}}; }
    else if (/review/i.test(v)) { fill={fgColor:{rgb:"FFF3E0"}}; font={...font,color:{rgb:"E65100"}}; }
    wst[a].s = {font, fill, alignment:{wrapText:true,vertical:"top"}, border:BA};
  }
  styleD(wst, tr2.length+1, th2.length);
  wst["!freeze"] = {xSplit:2,ySplit:1}; wst["!cols"] = TOOLS_FIELDS.map(f => ({wch:Math.round(f.w/7)})); wst["!rows"] = [{hpt:22},...tr2.map(()=>({hpt:60}))];
  XLSX.utils.book_append_sheet(wb, wst, "Monitoring Tools");

  // Ownership Matrix
  const oh = OWN_FIELDS.map(f => f.label);
  const or2 = ownership.map(r => OWN_FIELDS.map(f => r[f.key] || ''));
  const ws3 = XLSX.utils.aoa_to_sheet([oh, ...or2]);
  styleH(ws3, oh.length); styleD(ws3, or2.length+1, oh.length);
  ws3["!freeze"] = {xSplit:1,ySplit:1}; ws3["!cols"] = OWN_FIELDS.map(f => ({wch:Math.round(f.w/7)})); ws3["!rows"] = [{hpt:22},...or2.map(()=>({hpt:50}))];
  XLSX.utils.book_append_sheet(wb, ws3, "Ownership Matrix");

  // Change Log
  const lh = LOG_FIELDS.map(f => f.label);
  const lr = changelog.map(r => LOG_FIELDS.map(f => r[f.key] || ''));
  const ws4 = XLSX.utils.aoa_to_sheet([lh, ...lr]);
  styleH(ws4, lh.length);
  // comparability conditional (col 6)
  for (let r=1; r<lr.length+1; r++) {
    const a = XLSX.utils.encode_cell({r, c:6}); if (!ws4[a]) continue;
    const v = (ws4[a].v || '').toLowerCase(); const ev = r%2===0;
    let fill = ev ? {fgColor:{rgb:"F7FAF4"}} : undefined;
    let font = {name:"Calibri",sz:9,color:{rgb:"333333"}};
    if (v === 'full break') { fill={fgColor:{rgb:"FFF0F0"}}; font={...font,bold:true,color:{rgb:"C62828"}}; }
    else if (v === 'partial') { fill={fgColor:{rgb:"FFF8E1"}}; font={...font,color:{rgb:"E65100"}}; }
    ws4[a].s = {font, fill, alignment:{wrapText:true,vertical:"top"}, border:BA};
  }
  styleD(ws4, lr.length+1, lh.length);
  ws4["!freeze"] = {xSplit:1,ySplit:1}; ws4["!cols"] = LOG_FIELDS.map(f => ({wch:Math.round(f.w/7)})); ws4["!rows"] = [{hpt:22},...lr.map(()=>({hpt:55}))];
  XLSX.utils.book_append_sheet(wb, ws4, "Change Log");

  // About
  const prog = programInfo || {};
  const ad = [
    ["MEL SYSTEM WORKBOOK",""],["",""],
    ["Program", prog.programName||""],
    ["Organization", prog.organization||""],
    ["Donor", prog.donor||""],
    ["Period", prog.period||""],
    ["Country", prog.country||""],
    ["MEL Lead", prog.melLead||""],
    ["",""],
    ["Consultant","Burgen Belltawn"],["Title","MEL Specialist"],["Email","belltawnb@gmail.com"],["Website","https://belltawnb.github.io"],
    ["",""],
    ["Tool","MEL System Workbook"],["Tool URL","https://belltawnb.github.io/tools/mel-system-workbook.html"],
    ["Generated",""+new Date().toLocaleDateString("en-GB",{year:"numeric",month:"long",day:"numeric"})],
    ["",""],
    ["Disclaimer","This workbook was produced using a browser-based MEL system design tool."],
    ["","All content reflects user-entered data. Review before use in production reporting."],
    ["","Campbell's Law applies: indicators that become targets cease to be good measures."],
  ];
  const wsA = XLSX.utils.aoa_to_sheet(ad);
  wsA["!cols"] = [{wch:22},{wch:64}];
  if (wsA["A1"]) wsA["A1"].s = {font:{name:"Cambria",sz:14,bold:true,color:{rgb:FOREST}}};
  [2,3,4,5,6,7,8,10,11,12,13,15,16,17].forEach(r => { const a="A"+(r+1); if (wsA[a]) wsA[a].s={font:{name:"Calibri",sz:10,bold:true,color:{rgb:FOREST}}}; });
  if (wsA["A20"]) wsA["A20"].s = {font:{name:"Calibri",sz:10,bold:true,color:{rgb:"B8860B"}}};
  XLSX.utils.book_append_sheet(wb, wsA, "About");

  // Filename
  let fname = "MEL_System_Workbook";
  if (prog.programName) fname += "_" + prog.programName.replace(/[^a-zA-Z0-9]/g,'_').replace(/_+/g,'_').slice(0,40);
  fname += ".xlsx";
  XLSX.writeFile(wb, fname);
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [activeTab, setActiveTab] = useState('results');

  const [results, setResults]     = useState([]);
  const [register, setRegister]   = useState([]);
  const [dictionary, setDictionary] = useState([]);
  const [tools, setTools]         = useState([]);
  const [ownership, setOwnership] = useState([]);
  const [changelog, setChangelog] = useState([]);
  const [programInfo, setProgramInfo] = useState({});
  const [loaded, setLoaded]       = useState(false);

  const [toast, setToast]         = useState(null);
  const [modal, setModal]         = useState(null); // 'logframe'|'json'|'reset'|'logframe-conflict'
  const [importText, setImportText] = useState('');
  const [importErr, setImportErr] = useState('');
  const [pendingParse, setPendingParse] = useState(null); // { results, indicators } from parser

  // Load from localStorage on mount
  useEffect(() => {
    setResults(load(KEYS.results, []));
    setRegister(load(KEYS.register, []));
    setDictionary(load(KEYS.dictionary, []));
    setTools(load(KEYS.tools, []));
    setOwnership(load(KEYS.ownership, []));
    setChangelog(load(KEYS.changelog, []));
    setProgramInfo(load(KEYS.programInfo, {}));
    setLoaded(true);
  }, []);

  // Auto-save on change
  useEffect(() => { if (loaded) save(KEYS.results, results); }, [results, loaded]);
  useEffect(() => { if (loaded) save(KEYS.register, register); }, [register, loaded]);
  useEffect(() => { if (loaded) save(KEYS.dictionary, dictionary); }, [dictionary, loaded]);
  useEffect(() => { if (loaded) save(KEYS.tools, tools); }, [tools, loaded]);
  useEffect(() => { if (loaded) save(KEYS.ownership, ownership); }, [ownership, loaded]);
  useEffect(() => { if (loaded) save(KEYS.changelog, changelog); }, [changelog, loaded]);
  useEffect(() => { if (loaded) save(KEYS.programInfo, programInfo); }, [programInfo, loaded]);

  const showToast = (msg, type='ok') => { setToast({msg,type}); setTimeout(()=>setToast(null), 2800); };

  const loadExample = () => {
    setResults(EX_RESULTS);
    setRegister(EX_REGISTER);
    setDictionary(EX_DICT);
    setTools(EX_TOOLS);
    setOwnership(EX_OWN);
    setChangelog(EX_LOG);
    setProgramInfo(EX_PROGRAM);
    showToast('Loaded demo data — fictional food security program');
  };

  const upd = (setter) => (idx, field, val) => setter(prev => prev.map((r,i) => i!==idx ? r : {...r,[field]:val}));
  const add = (setter, fields) => () => setter(prev => [...prev, makeRow(fields)]);
  const del = (setter) => (idx) => setter(prev => prev.filter((_,i) => i!==idx));

  // Auto-ID for results rows
  const addResult = () => {
    setResults(prev => {
      const newRow = makeRow(RESULTS_FIELDS);
      return [...prev, newRow];
    });
  };

  const handleResultLevelChange = (idx, val) => {
    setResults(prev => {
      const updated = prev.map((r,i) => i!==idx ? r : {...r, level:val});
      // Only suggest ID if current ID is blank
      if (!prev[idx].resultId) {
        const suggested = suggestResultId(val, prev.filter((_,i)=>i!==idx));
        return updated.map((r,i) => i!==idx ? r : {...r, resultId:suggested});
      }
      return updated;
    });
  };

  // Logframe import handler
  const handleLogframeImport = () => {
    setImportErr('');
    const parsed = parseLogframe(importText, results);

    if (!parsed.indicators.length && !parsed.results.length) {
      setImportErr('No rows detected. Ensure rows are tab-separated (copy directly from Excel).');
      return;
    }

    // Warn if results were found but indicators are missing or suspiciously few
    const expectedIndicators = parsed.results.length > 0 ? parsed.results.length : 1;
    if (parsed.results.length > 0 && parsed.indicators.length < Math.max(1, parsed.results.length - 1)) {
      setImportErr(
        `Found ${parsed.results.length} result(s) but only ${parsed.indicators.length} indicator(s). ` +
        `This tool expects indicators in column B with an ID prefix (e.g. "P 1.1 Percentage of…", "OP 1.1.1 Number of…"). ` +
        `If your logframe uses a different layout, try reorganising it to match this format before pasting. ` +
        `You can still import what was detected by clicking Import Anyway, or cancel to adjust your logframe.`
      );
      // Stash the partial parse so "Import Anyway" can use it
      setPendingParse({ ...parsed, partial: true });
      return;
    }

    if (parsed.results.length > 0 && results.length > 0) {
      setPendingParse(parsed);
      setModal('logframe-conflict');
    } else {
      applyParsedLogframe(parsed, 'append');
    }
  };

  const applyParsedLogframe = (parsed, mode) => {
    if (parsed.results.length > 0) {
      if (mode === 'replace') {
        setResults(parsed.results);
      } else {
        setResults(prev => [...prev, ...parsed.results]);
      }
    }
    setRegister(prev => [...prev, ...parsed.indicators]);
    setModal(null);
    setImportText('');
    setPendingParse(null);
    const parts = [];
    if (parsed.results.length) parts.push(`${parsed.results.length} result(s)`);
    if (parsed.indicators.length) parts.push(`${parsed.indicators.length} indicator(s)`);
    showToast(`Imported ${parts.join(' and ')} from logframe`);
  };

  const handleJsonImport = () => {
    setImportErr('');
    try {
      const data = JSON.parse(importText);
      const inds = Array.isArray(data) ? data : (data.indicators || [data]);
      const rows = inds.map((ind,i) => ({
        ...makeRow(REGISTER_FIELDS),
        _id: Date.now()+i,
        indicatorId:         ind.id || ind.indicatorId || '',
        name:                ind.name || ind.indicator_name || '',
        definition:          ind.definition || ind.authoritative_definition || '',
        unit:                ind.unit || '',
        numerator:           ind.numerator || '',
        denominator:         ind.denominator || '',
        baseline:            ind.baseline || '',
        target:              ind.target || '',
        disaggregations:     Array.isArray(ind.disaggregations) ? ind.disaggregations.join(', ') : (ind.disaggregations || ''),
        frequency:           ind.frequency || '',
        meansOfVerification: ind.meansOfVerification || '',
        questionSource:      ind.surveyQuestions || ind.questionSource || '',
        analysisMethod:      ind.analysisMethod || '',
        audience:            ind.audience || '',
      }));
      setRegister(prev => [...prev, ...rows]);
      setModal(null); setImportText('');
      showToast(`Imported ${rows.length} indicator(s) from JSON`);
    } catch(e) {
      setImportErr('Invalid JSON. Check format and try again.');
    }
  };

  const totalRows = results.length + register.length + ownership.length + changelog.length;

  // Button styles
  const addBtn = {background:C.ochreLight,color:C.ochre,border:`1.5px solid ${C.ochreBorder}`,borderRadius:6,padding:'7px 16px',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:"'Outfit',sans-serif"};
  const ghostBtn = {marginTop:10,background:'none',color:C.muted,border:`1px dashed ${C.border}`,borderRadius:6,padding:'8px 20px',fontSize:12,cursor:'pointer',width:'100%',fontFamily:"'Outfit',sans-serif"};
  const outlineBtn = {background:C.surface,color:C.inkSoft,border:`1px solid ${C.border}`,borderRadius:6,padding:'7px 14px',fontSize:13,cursor:'pointer',fontFamily:"'Outfit',sans-serif"};

  const TABS = [
    { key:'results',    label:'Results Framework',   count:results.length,   icon:'🎯' },
    { key:'register',   label:'Indicator Register',   count:register.length,  icon:'📋' },
    { key:'dictionary', label:'Indicator Governance', count:dictionary.length,icon:'📖' },
    { key:'tools',      label:'Monitoring Tools',     count:tools.length,     icon:'🔧' },
    { key:'ownership',  label:'Ownership Matrix',     count:ownership.length, icon:'🔐' },
    { key:'changelog',  label:'Change Log',           count:changelog.length, icon:'📝' },
    { key:'about',      label:'About / Export',       count:null,             icon:'📤' },
  ];

  return (
    <div style={{background:C.bg,minHeight:'100vh',paddingBottom:80}}>

      {/* Hero */}
      <div style={{background:`linear-gradient(135deg,${C.ochreLight} 0%,#FFFDF7 100%)`,borderBottom:`1px solid ${C.ochreBorder}`,padding:'26px 32px 18px'}}>
        <div style={{maxWidth:1440,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:16}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                <span style={{fontSize:22}}>📊</span>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,fontWeight:600,color:C.ochre,letterSpacing:'0.12em',textTransform:'uppercase',background:C.sand,border:`1px solid ${C.ochreBorder}`,borderRadius:3,padding:'3px 8px'}}>Tool 5 — MEL System</span>
              </div>
              <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:26,color:C.ink,letterSpacing:'-0.02em',marginBottom:4}}>MEL System Workbook</h1>
              <p style={{color:C.inkSoft,fontSize:13,maxWidth:560,lineHeight:1.6}}>Build your program's indicator measurement system. Data persists between sessions and exports to a formatted Excel workbook.</p>
            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
              <button onClick={loadExample} style={{background:C.ochre,color:'#fff',border:'none',borderRadius:6,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:"'Outfit',sans-serif"}}>Load Example</button>
              <button onClick={() => { setModal('logframe'); setImportText(''); setImportErr(''); setPendingParse(null); }} style={{...outlineBtn,color:C.ochre,borderColor:C.ochre,fontWeight:600}}>Paste Logframe</button>
              <button onClick={() => exportAll(results, register, dictionary, tools, ownership, changelog, programInfo)} disabled={totalRows===0}
                style={{background:'#2D5016',color:'#fff',border:'none',borderRadius:6,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:"'Outfit',sans-serif",opacity:totalRows===0?0.5:1}}>
                ↓ Export Excel
              </button>
              <button onClick={() => setModal('reset')} style={{...outlineBtn,fontSize:12}}>Clear All</button>
            </div>
          </div>
        </div>
      </div>

      {/* Tab nav */}
      <div style={{borderBottom:`2px solid ${C.border}`,background:C.surface,padding:'0 32px',position:'sticky',top:0,zIndex:100}}>
        <div style={{maxWidth:1440,margin:'0 auto',display:'flex'}}>
          {TABS.map(t => (
            <button key={t.key} onClick={() => setActiveTab(t.key)}
              style={{background:'none',border:'none',cursor:'pointer',padding:'12px 18px 10px',borderBottom:activeTab===t.key?`3px solid ${C.ochre}`:'3px solid transparent',color:activeTab===t.key?C.ochre:C.inkSoft,fontSize:13,fontWeight:activeTab===t.key?600:400,fontFamily:"'Outfit',sans-serif",display:'flex',alignItems:'center',gap:7,whiteSpace:'nowrap',marginBottom:-2}}>
              <span>{t.icon}</span>
              {t.label}
              {t.count !== null && (
                <span style={{background:activeTab===t.key?C.ochre:C.border,color:activeTab===t.key?'#fff':C.muted,borderRadius:10,padding:'1px 7px',fontSize:10,fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,minWidth:18,textAlign:'center'}}>{t.count}</span>
              )}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{maxWidth:1440,margin:'0 auto',padding:'22px 32px'}}>

        {/* ── Tab 1: Results Framework ── */}
        {activeTab === 'results' && (
          <div>
            <TabBanner
              title="Results Framework"
              purpose="Defines the program's causal hierarchy — Goal through Outputs — with result statements and key assumptions. This is the skeleton that the Indicator Register maps onto. One row per result."
              groups={RESULTS_GROUPS}
              note="Need AI-powered logic analysis of your results chain? The Results Chain Logic Checker tool (coming soon) will offer causal logic review, indicator coverage mapping, and assumption testing."
            />
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12,gap:8}}>
              <button onClick={() => { setModal('logframe'); setImportText(''); setImportErr(''); setPendingParse(null); }} style={{...outlineBtn,color:C.ochre,borderColor:C.ochre,fontWeight:600}}>Paste Logframe</button>
              <button onClick={addResult} style={addBtn}>+ Add Row</button>
            </div>
            {results.length === 0 ? <EmptyState label="results framework rows" onExample={loadExample} /> : (
              <DataTable
                data={results}
                fields={RESULTS_FIELDS}
                groups={RESULTS_GROUPS}
                onUpdate={(idx, field, val) => {
                  if (field === 'level') {
                    handleResultLevelChange(idx, val);
                  } else {
                    upd(setResults)(idx, field, val);
                  }
                }}
                onDelete={del(setResults)}
                results={results}
                register={register}
              />
            )}
            <button onClick={addResult} style={ghostBtn}>+ Add result row</button>
          </div>
        )}

        {/* ── Tab 2: Indicator Register ── */}
        {activeTab === 'register' && (
          <div>
            <TabBanner
              title="Indicator Register"
              purpose="The program's authoritative indicator list. Each indicator is linked to a result in the Results Framework. Includes definitions, measurement parameters, data sources, and targets. This is the single source of truth — the Dictionary, Monitoring Tools, and Governance tabs all reference indicators from here."
              groups={REGISTER_GROUPS}
            />
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12,gap:8,alignItems:'center'}}>
              <button onClick={() => { setModal('logframe'); setImportText(''); setImportErr(''); setPendingParse(null); }} style={outlineBtn}>Paste from logframe</button>
              <button onClick={add(setRegister, REGISTER_FIELDS)} style={addBtn}>+ Add Row</button>
              <button onClick={() => { setModal('json'); setImportText(''); setImportErr(''); }} style={{background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:11,textDecoration:'underline',fontFamily:"'DM Sans',sans-serif",padding:'0 4px'}}>Import JSON</button>
            </div>
            {register.length === 0 ? <EmptyState label="indicator rows" onExample={loadExample} /> : (
              <DataTable
                data={register}
                fields={REGISTER_FIELDS}
                groups={REGISTER_GROUPS}
                onUpdate={upd(setRegister)}
                onDelete={del(setRegister)}
                results={results}
                register={register}
              />
            )}
            <button onClick={add(setRegister, REGISTER_FIELDS)} style={ghostBtn}>+ Add indicator row</button>
          </div>
        )}

        {/* ── Tab 3: Indicator Governance ── */}
        {activeTab === 'dictionary' && (
          <div>
            <TabBanner
              title="Indicator Governance"
              purpose="Defines the <strong>authoritative meaning, boundaries, and allowed use</strong> of each indicator. This stabilizes indicators over time, even when tools, staff, or context change. Focus on outcome and impact indicators that require governance precision — not every output count needs an entry here."
              groups={DICT_GROUPS}
              note="To add an entry: click '+ Add Row', then select an indicator from the dropdown. Fields will pre-populate from the Indicator Register — review and complete the governance-specific fields (inclusion/exclusion rules, interpretive boundaries, PIRS status)."
            />
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12,gap:8}}>
              <button onClick={add(setDictionary, DICT_FIELDS)} style={addBtn}>+ Add Row</button>
            </div>
            {dictionary.length === 0 ? <EmptyState label="governance entries" onExample={loadExample} /> : (
              <DataTable
                data={dictionary}
                fields={DICT_FIELDS}
                groups={DICT_GROUPS}
                onUpdate={upd(setDictionary)}
                onDelete={del(setDictionary)}
                results={results}
                register={register}
                dictionaryEntries={dictionary}
                onSelectRow={(idx, regRow) => {
                  // Pre-populate governance fields from the Register row
                  setDictionary(prev => prev.map((row, i) => {
                    if (i !== idx) return row;
                    return {
                      ...row,
                      reqDisagg:    row.reqDisagg    || regRow.disaggregations || '',
                      sourceFramework: row.sourceFramework || mapSourceFramework(regRow.source, regRow.name),
                      // Seed population from definition if blank — gives user a starting point
                      population:   row.population   || (regRow.definition ? regRow.definition.slice(0, 120) : ''),
                    };
                  }));
                }}
              />
            )}
            <button onClick={add(setDictionary, DICT_FIELDS)} style={ghostBtn}>+ Add governance entry</button>
          </div>
        )}

        {/* ── Tab 4: Monitoring Tools ── */}
        {activeTab === 'tools' && (
          <div>
            <TabBanner
              title="Monitoring Tool Registry"
              purpose="Documents every data collection instrument, its purpose, sampling approach, and which indicators it feeds. This is the bridge between your indicator plan and your field operations. One row per tool."
              groups={TOOLS_GROUPS}
              note="The Indicators Covered field is a free-text list. Type indicator names separated by commas, or copy them from the Indicator Register. Keeping these in sync with the Register ensures every indicator has a traceable data source."
            />
            <div style={{background:'#FFF8E1',border:'1px solid #E8D89A',borderRadius:6,padding:'9px 14px',marginBottom:16,fontSize:12,color:'#6B5010',lineHeight:1.6}}>
              💡 Need to design or refine a data collection instrument? The <strong>Survey Planner</strong> tool (coming soon) generates structured, decision-ready survey plans grounded in your program specifications, donor requirements, and logframe.
            </div>
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12,gap:8}}>
              <button onClick={() => {
                // Auto-suggest next tool ID
                const nextNum = tools.length + 1;
                setTools(prev => [...prev, { ...makeRow(TOOLS_FIELDS), toolId: 'T' + nextNum }]);
              }} style={addBtn}>+ Add Tool</button>
            </div>
            {tools.length === 0 ? <EmptyState label="monitoring tools" onExample={loadExample} /> : (
              <DataTable
                data={tools}
                fields={TOOLS_FIELDS}
                groups={TOOLS_GROUPS}
                onUpdate={upd(setTools)}
                onDelete={del(setTools)}
                results={results}
                register={register}
              />
            )}
            <button onClick={() => {
              const nextNum = tools.length + 1;
              setTools(prev => [...prev, { ...makeRow(TOOLS_FIELDS), toolId: 'T' + nextNum }]);
            }} style={ghostBtn}>+ Add monitoring tool</button>
          </div>
        )}

        {/* ── Tab 5: Ownership Matrix ── */}
        {activeTab === 'ownership' && (
          <div>
            <TabBanner
              title="Ownership Matrix"
              purpose="Defines who has <strong>authority to define, modify, approve, and retire indicators</strong>, and what documentation and escalation is required."
              groups={OWN_GROUPS}
            />
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
              <button onClick={add(setOwnership, OWN_FIELDS)} style={addBtn}>+ Add Row</button>
            </div>
            {ownership.length === 0 ? <EmptyState label="ownership matrix rows" onExample={loadExample} /> : (
              <DataTable data={ownership} fields={OWN_FIELDS} groups={OWN_GROUPS} onUpdate={upd(setOwnership)} onDelete={del(setOwnership)} results={results} register={register} />
            )}
            <button onClick={add(setOwnership, OWN_FIELDS)} style={ghostBtn}>+ Add governance action</button>
          </div>
        )}

        {/* ── Tab 6: Change Log ── */}
        {activeTab === 'changelog' && (
          <div>
            <TabBanner
              title="Change Log"
              purpose="Records <strong>why indicators changed and whether comparability was affected</strong>. This is a <strong>decision and risk register</strong>. The indicator dropdown is populated from the Register."
              groups={LOG_GROUPS}
            />
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
              <button onClick={add(setChangelog, LOG_FIELDS)} style={addBtn}>+ Add Entry</button>
            </div>
            {changelog.length === 0 ? <EmptyState label="change log entries" onExample={loadExample} /> : (
              <DataTable data={changelog} fields={LOG_FIELDS} groups={LOG_GROUPS} onUpdate={upd(setChangelog)} onDelete={del(setChangelog)} results={results} register={register} />
            )}
            <button onClick={add(setChangelog, LOG_FIELDS)} style={ghostBtn}>+ Add change log entry</button>
          </div>
        )}

        {/* ── Tab 6: About / Export ── */}
        {activeTab === 'about' && (
          <div style={{maxWidth:720}}>
            <TabBanner
              title="About / Export"
              purpose="Program metadata and export controls. Information entered here appears in the Excel workbook's About sheet."
            />
            {/* Program info form */}
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'24px 28px',marginBottom:24}}>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:16,color:C.ink,marginBottom:16}}>Program Information</div>
              {[
                {key:'programName',label:'Program Name'},
                {key:'organization',label:'Implementing Organization'},
                {key:'donor',label:'Donor / Funding Source'},
                {key:'period',label:'Program Period'},
                {key:'country',label:'Country / Region'},
                {key:'melLead',label:'MEL Lead Name'},
              ].map(f => (
                <div key={f.key} style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
                  <label style={{width:220,fontSize:12,fontWeight:600,color:C.inkSoft,fontFamily:"'DM Sans',sans-serif",flexShrink:0}}>{f.label}</label>
                  <input value={programInfo[f.key]||''} onChange={e => setProgramInfo(prev => ({...prev,[f.key]:e.target.value}))}
                    style={{flex:1,border:`1px solid ${C.border}`,borderRadius:5,padding:'7px 10px',fontSize:13,fontFamily:"'DM Sans',sans-serif",color:C.ink,outline:'none'}}
                  />
                </div>
              ))}
            </div>

            {/* Export controls */}
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'24px 28px',marginBottom:24}}>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:16,color:C.ink,marginBottom:16}}>Export</div>
              <button onClick={() => exportAll(results, register, dictionary, tools, ownership, changelog, programInfo)} disabled={totalRows===0}
                style={{background:'#2D5016',color:'#fff',border:'none',borderRadius:6,padding:'10px 22px',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:"'Outfit',sans-serif",opacity:totalRows===0?0.5:1,marginRight:12}}>
                ↓ Export Full Workbook (.xlsx)
              </button>
              <span style={{fontSize:12,color:C.muted}}>Exports all tabs as a formatted Excel workbook.</span>
            </div>

            {/* Branding */}
            <div style={{background:C.ochreLight,border:`1px solid ${C.ochreBorder}`,borderRadius:8,padding:'20px 24px',fontSize:12,color:C.inkSoft,lineHeight:1.7}}>
              <div><strong style={{color:C.ink}}>MEL System Workbook</strong> — Tool 5 in the Burgen Belltawn MEL Tools portfolio.</div>
              <div>Built by <a href="https://belltawnb.github.io" target="_blank" style={{color:C.ochre}}>Burgen Belltawn</a></div>
              <div style={{marginTop:8,fontSize:11,color:C.muted,fontStyle:'italic'}}>Campbell's Law applies: indicators that become targets cease to be good measures.</div>
            </div>
          </div>
        )}

      </div>

      {/* ── Logframe paste modal ── */}
      {modal === 'logframe' && (
        <Modal title="Paste from Logframe" onClose={() => { setModal(null); setImportErr(''); }}>
          <p style={{fontSize:12,color:C.inkSoft,marginBottom:8,lineHeight:1.6}}>Copy rows directly from Excel (Ctrl+C) and paste below. Results-level rows (Purpose 1:, Output 1.1:, etc.) go to the Results Framework. Indicator rows (P 1.1, OP 1.1.1, etc.) go to the Indicator Register with definitions and other fields mapped automatically.</p>
          <div style={{background:'#F5F5F5',borderRadius:4,padding:'7px 10px',fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:C.muted,marginBottom:10,lineHeight:1.7}}>
            Results detected: col A starting with Purpose 1:, Output 1.2:, Outcome:, Goal:…<br />
            Indicators detected: col B starting with P 1.1, OP 1.1.1, % of, Number of…<br />
            Skipped automatically: header rows, definition text, source/MoV/target cells, null values, bullet fragments
          </div>
          <textarea value={importText} onChange={e => setImportText(e.target.value)} placeholder="Paste rows from Excel here…"
            style={{width:'100%',height:160,padding:'10px 12px',borderRadius:6,border:`1.5px solid ${importErr?C.red:C.border}`,fontFamily:"'IBM Plex Mono',monospace",fontSize:12,resize:'vertical',outline:'none'}}
          />
          <div style={{marginTop:6,fontSize:11,color:C.muted,lineHeight:1.6}}>
            <a href="https://belltawnb.github.io/assets/Logframe_Template.xlsx" download
               style={{color:C.ochre,textDecoration:'none',fontWeight:500}}>
              Download logframe template ↓
            </a>
          </div>
          {importErr && <div style={{color:C.red,fontSize:12,marginTop:6,lineHeight:1.6}}>⚠ {importErr}</div>}
          <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:14}}>
            <button onClick={() => { setModal(null); setImportErr(''); setPendingParse(null); }} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:6,padding:'7px 16px',cursor:'pointer',fontSize:13,color:C.inkSoft}}>Cancel</button>
            {pendingParse && pendingParse.partial && (
              <button onClick={() => { const p = {...pendingParse, partial:false}; if (results.length > 0 && p.results.length > 0) { setPendingParse(p); setModal('logframe-conflict'); } else { applyParsedLogframe(p,'append'); } setImportErr(''); }}
                style={{background:'none',border:`1.5px solid ${C.ochre}`,color:C.ochre,borderRadius:6,padding:'7px 16px',cursor:'pointer',fontSize:13,fontWeight:600}}>Import Anyway</button>
            )}
            {!(pendingParse && pendingParse.partial) && (
              <button onClick={handleLogframeImport} style={{background:C.ochre,color:'#fff',border:'none',borderRadius:6,padding:'7px 16px',cursor:'pointer',fontSize:13,fontWeight:600}}>Import Rows</button>
            )}
          </div>
        </Modal>
      )}

      {/* ── Logframe conflict modal (Tab 1 already has data) ── */}
      {modal === 'logframe-conflict' && pendingParse && (
        <Modal title="Results Framework already has data" onClose={() => { setModal(null); setPendingParse(null); }}>
          <p style={{fontSize:13,color:C.inkSoft,lineHeight:1.65,marginBottom:16}}>
            The parser found <strong>{pendingParse.results.length} result(s)</strong> and <strong>{pendingParse.indicators.length} indicator(s)</strong> in your logframe.<br />
            Your Results Framework already has {results.length} row(s). What would you like to do with the parsed results?
          </p>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
            <button onClick={() => applyParsedLogframe(pendingParse,'append')}
              style={{background:C.ochreLight,border:`1.5px solid ${C.ochreBorder}`,borderRadius:6,padding:'10px 16px',cursor:'pointer',textAlign:'left',fontFamily:"'Outfit',sans-serif"}}>
              <div style={{fontWeight:600,color:C.ink,fontSize:13}}>Add to existing results</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>Parsed results are appended. You may need to delete duplicates manually.</div>
            </button>
            <button onClick={() => applyParsedLogframe(pendingParse,'replace')}
              style={{background:'#FFF0F0',border:`1.5px solid ${C.red}55`,borderRadius:6,padding:'10px 16px',cursor:'pointer',textAlign:'left',fontFamily:"'Outfit',sans-serif"}}>
              <div style={{fontWeight:600,color:C.red,fontSize:13}}>Replace existing results</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>Current Results Framework rows will be deleted and replaced. This cannot be undone.</div>
            </button>
          </div>
          <div style={{display:'flex',justifyContent:'flex-end'}}>
            <button onClick={() => { setModal(null); setPendingParse(null); }} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:6,padding:'7px 16px',cursor:'pointer',fontSize:13,color:C.inkSoft}}>Cancel</button>
          </div>
        </Modal>
      )}

      {/* ── JSON import modal ── */}
      {modal === 'json' && (
        <Modal title="Import Indicator Data" onClose={() => { setModal(null); setImportErr(''); }}>
          <p style={{fontSize:12,color:C.inkSoft,marginBottom:12,lineHeight:1.6}}>Paste data exported from the Indicator Quality Reviewer, or any array of indicator objects in JSON format. All matching fields will be mapped to the register.</p>
          <textarea value={importText} onChange={e => setImportText(e.target.value)} placeholder='[{"name":"...","definition":"...","unit":"..."}]'
            style={{width:'100%',height:150,padding:'10px 12px',borderRadius:6,border:`1.5px solid ${importErr?C.red:C.border}`,fontFamily:"'IBM Plex Mono',monospace",fontSize:12,resize:'vertical',outline:'none'}}
          />
          {importErr && <div style={{color:C.red,fontSize:12,marginTop:6}}>⚠ {importErr}</div>}
          <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:14}}>
            <button onClick={() => { setModal(null); setImportErr(''); }} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:6,padding:'7px 16px',cursor:'pointer',fontSize:13,color:C.inkSoft}}>Cancel</button>
            <button onClick={handleJsonImport} style={{background:C.ochre,color:'#fff',border:'none',borderRadius:6,padding:'7px 16px',cursor:'pointer',fontSize:13,fontWeight:600}}>Import Data</button>
          </div>
        </Modal>
      )}

      {/* ── Reset modal ── */}
      {modal === 'reset' && (
        <Modal title="Clear all workbook data?" onClose={() => setModal(null)}>
          <p style={{fontSize:13,color:C.inkSoft,lineHeight:1.6}}>This deletes all rows across all tabs from storage. This cannot be undone.</p>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
            <button onClick={() => setModal(null)} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:6,padding:'7px 16px',cursor:'pointer',fontSize:13,color:C.inkSoft}}>Cancel</button>
            <button onClick={() => { setResults([]); setRegister([]); setDictionary([]); setTools([]); setOwnership([]); setChangelog([]); setProgramInfo({}); setModal(null); showToast('Workbook cleared','warn'); }}
              style={{background:C.red,color:'#fff',border:'none',borderRadius:6,padding:'7px 16px',cursor:'pointer',fontSize:13,fontWeight:600}}>Clear All</button>
          </div>
        </Modal>
      )}

      {/* ── Toast ── */}
      {toast && (
        <div style={{position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',background:toast.type==='warn'?'#3D2B22':'#2D5016',color:'#fff',borderRadius:8,padding:'10px 22px',fontSize:13,fontWeight:500,zIndex:9999,boxShadow:'0 4px 24px rgba(0,0,0,0.18)',fontFamily:"'Outfit',sans-serif",whiteSpace:'nowrap'}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
</body>
</html>
